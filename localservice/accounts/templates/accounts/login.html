{% extends 'base.html' %}
{% block title %}Login — LocalService Connect{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-title">Welcome back</div>
  <div class="auth-sub">Log in to your account</div>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required autofocus placeholder="Your username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Your password">
    </div>
    {% if form.errors %}
      <p style="color:#A32D2D;font-size:13px;margin-bottom:12px;">Invalid username or password.</p>
    {% endif %}
    <button class="btn btn-primary" style="width:100%;margin-top:4px;" type="submit">Log in</button>
  </form>
  <div class="auth-footer">Don't have an account? <a href="{% url 'register' %}">Register here</a></div>
</div>
{% endblock %}
